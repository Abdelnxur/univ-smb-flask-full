<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Web Configurator</title>
    <style>

        body {
            font-family: monospace;
            background-color: #f5f5f5;
            color: #333;
            font-size: 16px;
        }

        nav {
            background-color: #58b368;
            padding: 10px 20px;
        }

        nav a {
            color: #333;
            text-decoration: none;
            margin-right: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #58b368;
            color: #333;
        }

        .btn-add { background-color: #58b368; color: #333; margin-bottom: 15px; margin-top: 15px; padding: 5px 15px; border-radius: 3px; text-decoration: none; display: inline-block; }
        .btn-detail { background-color: #5b9bd5; color: #333; padding: 5px 15px; border-radius: 3px; text-decoration: none; }
        .btn-delete { background-color: #d9534f; color: #333; padding: 5px 15px; border-radius: 3px; text-decoration: none; }
        .btn-back { background-color: #909090; color: #333; padding: 5px 15px; border-radius: 3px; text-decoration: none; margin-bottom: 15px; display: inline-block; }
        
        input {
            border: 1px solid #58b368;
            padding: 8px;
            width: 100%;
            margin-bottom: 15px;
        }

        .config-block {
            background-color: #f9f9f9;
            border: 1px solid #58b368;
            padding: 20px;
            margin-top: 20px;
        }

    </style>
</head>

<body>
    <nav>
        <a href="{{ url_for('start') }}">Web Configurator</a>
        <a href="{{ url_for('webservers') }}">Webservers</a>
        <a href="{{ url_for('reverseproxies') }}">Reverse Proxies</a>
        <a href="{{ url_for('loadbalancers') }}">Load Balancers</a>
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
